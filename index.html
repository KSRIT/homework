<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบการบ้านและผลงาน ม.4/2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: { fontFamily: { sans: ['Kanit', 'sans-serif'] }, colors: { brand: { blue: '#3B82F6', blue_light: '#DBEAFE', pink: '#EC4899', pink_light: '#FCE7F3', bg: '#F8FAFC' } } }
            }
        }
    </script>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f0fdf4; background: linear-gradient(135deg, #eff6ff 0%, #fdf2f8 100%); min-height: 100vh; }
        .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
        .hide { display: none !important; }
        #loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.9); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { border: 4px solid #DBEAFE; border-top: 4px solid #3B82F6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-800">

    <!-- ========== ตั้งค่า URL ของ GAS ที่นี่ ========== -->
    <script>
        const GAS_WEBAPP_URL = ""; // ใส่ URL Web App ของคุณที่นี่
        const DEFAULT_AVATAR = "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
    </script>

    <div id="loader-overlay" class="hide">
        <div class="text-center">
            <div class="spinner"></div>
            <p class="text-brand-blue font-medium" id="loader-text">กำลังเชื่อมต่อฐานข้อมูล...</p>
        </div>
    </div>
    <div id="toast-container" class="fixed top-5 right-5 z-[60] flex flex-col gap-2 pointer-events-none"></div>

    <!-- Hidden Input for Profile Upload -->
    <input type="file" id="profile-upload" accept="image/*" class="hide" onchange="handleProfileUpload(event)">

    <!-- ==================== LOGIN / REGISTER VIEW ==================== -->
    <div id="auth-view" class="min-h-screen flex items-center justify-center p-4">
        <div class="glass-panel w-full max-w-md rounded-3xl shadow-2xl p-8 transform transition-all relative overflow-hidden">
            <div class="text-center mb-8 relative z-10">
                <img src="https://cdn-icons-png.flaticon.com/512/3281/3281323.png" alt="Logo" class="w-20 h-20 mx-auto mb-4 object-contain">
                <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-brand-blue to-brand-pink">ระบบจัดการการบ้าน</h1>
                <p class="text-gray-500 mt-1">ม.4/2 ปากแพรกวิทยาคม</p>
            </div>

            <!-- Login Form -->
            <form id="login-form" onsubmit="handleLogin(event)" class="relative z-10">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อผู้ใช้งาน</label>
                    <div class="relative"><i class="fas fa-user absolute left-3 top-3 text-gray-400"></i><input type="text" id="login-username" required class="w-full pl-10 pr-4 py-2 bg-white/80 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-blue outline-none"></div>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">รหัสผ่าน</label>
                    <div class="relative"><i class="fas fa-lock absolute left-3 top-3 text-gray-400"></i><input type="password" id="login-password" required class="w-full pl-10 pr-4 py-2 bg-white/80 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-pink outline-none"></div>
                </div>
                <button type="submit" class="w-full py-3 rounded-xl bg-gradient-to-r from-brand-blue to-brand-pink text-white font-semibold shadow-lg hover:shadow-xl transition-all">เข้าสู่ระบบ</button>
                <div class="mt-4 pt-4 border-t border-gray-200 text-center">
                    <button type="button" onclick="toggleAuthMode()" class="px-4 py-2 bg-white border border-brand-blue text-brand-blue rounded-xl text-sm font-medium hover:bg-blue-50 transition-colors w-full"><i class="fas fa-user-plus mr-1"></i> ลงทะเบียนนักเรียนใหม่</button>
                </div>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="hide relative z-10" onsubmit="handleRegister(event)">
                <div class="flex items-center gap-2 mb-6">
                    <button type="button" onclick="toggleAuthMode()" class="text-gray-400 hover:text-gray-700"><i class="fas fa-arrow-left"></i></button>
                    <h2 class="text-lg font-bold text-gray-800">ลงทะเบียน</h2>
                </div>
                <div class="mb-3"><label class="block text-sm font-medium mb-1">ชื่อ-นามสกุล</label><input type="text" id="reg-name" required class="w-full px-4 py-2 bg-white/80 border rounded-xl focus:ring-2 focus:ring-brand-blue outline-none"></div>
                <div class="mb-3"><label class="block text-sm font-medium mb-1">เลขที่</label><input type="number" id="reg-no" required min="1" max="50" class="w-full px-4 py-2 bg-white/80 border rounded-xl focus:ring-2 focus:ring-brand-blue outline-none"></div>
                <div class="mb-3"><label class="block text-sm font-medium mb-1">ชื่อผู้ใช้งาน (ล็อกอิน)</label><input type="text" id="reg-username" required class="w-full px-4 py-2 bg-white/80 border rounded-xl focus:ring-2 focus:ring-brand-blue outline-none"></div>
                <div class="mb-6"><label class="block text-sm font-medium mb-1">รหัสผ่าน</label><input type="password" id="reg-password" required class="w-full px-4 py-2 bg-white/80 border rounded-xl focus:ring-2 focus:ring-brand-blue outline-none"></div>
                <button type="submit" class="w-full py-3 rounded-xl bg-brand-blue text-white font-semibold shadow-lg hover:bg-blue-600 transition-all">สร้างบัญชีและโฟลเดอร์</button>
            </form>
        </div>
    </div>

    <!-- ==================== MAIN DASHBOARD ==================== -->
    <div id="main-view" class="hide h-screen flex overflow-hidden">
        
        <!-- Sidebar -->
        <aside class="w-64 glass-panel flex flex-col justify-between hidden md:flex border-r border-gray-100 relative z-20 shadow-lg">
            <div>
                <div class="p-6 text-center border-b border-gray-100">
                    <div class="relative inline-block group cursor-pointer" onclick="document.getElementById('profile-upload').click()">
                        <img id="nav-profile-img" src="" class="w-24 h-24 mx-auto rounded-full border-4 border-white shadow-md mb-3 object-cover group-hover:opacity-70 transition-all">
                        <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"><i class="fas fa-camera text-white text-2xl drop-shadow-md"></i></div>
                    </div>
                    <h2 id="nav-user-name" class="font-bold text-lg text-gray-800 line-clamp-1">...</h2>
                    <span id="nav-user-role" class="text-xs px-3 py-1 bg-brand-blue_light text-brand-blue rounded-full font-medium inline-block mt-1">...</span>
                </div>
                <nav class="p-4 space-y-2" id="nav-menu"></nav>
            </div>
            <div class="p-4 border-t border-gray-100">
                <button onclick="handleLogout()" class="w-full py-2 flex items-center justify-center gap-2 text-gray-500 hover:text-red-500 rounded-xl transition-colors font-medium"><i class="fas fa-sign-out-alt"></i> ออกจากระบบ</button>
            </div>
        </aside>

        <!-- Mobile Header & Menu -->
        <div class="md:hidden fixed top-0 w-full glass-panel z-30 px-4 py-3 flex justify-between items-center shadow-sm">
            <div class="font-bold text-transparent bg-clip-text bg-gradient-to-r from-brand-blue to-brand-pink flex items-center gap-2">
                <img id="mobile-header-img" src="" class="w-8 h-8 rounded-full object-cover border border-gray-200" onclick="document.getElementById('profile-upload').click()">
                ม.4/2
            </div>
            <button onclick="document.getElementById('mobile-menu').classList.toggle('hide')" class="text-gray-600 text-2xl"><i class="fas fa-bars"></i></button>
        </div>
        <div id="mobile-menu" class="hide fixed inset-0 bg-white/95 backdrop-blur-md z-40 p-6 pt-20 flex flex-col">
            <button onclick="document.getElementById('mobile-menu').classList.add('hide')" class="absolute top-4 right-4 text-2xl"><i class="fas fa-times"></i></button>
            <div class="text-center mb-6" onclick="document.getElementById('profile-upload').click()">
                <img id="mobile-menu-img" src="" class="w-20 h-20 mx-auto rounded-full object-cover border-4 border-brand-blue_light mb-2">
                <p class="text-xs text-gray-400">แตะเพื่อเปลี่ยนรูป</p>
            </div>
            <nav class="space-y-4 flex-1" id="mobile-nav-menu"></nav>
            <button onclick="handleLogout()" class="mt-auto py-3 bg-red-50 text-red-500 rounded-xl font-bold border border-red-100">ออกจากระบบ</button>
        </div>

        <!-- Main Content Area -->
        <main class="flex-1 overflow-y-auto custom-scrollbar p-4 md:p-8 pt-20 md:pt-8 relative bg-transparent">
            <header class="mb-8 pr-12">
                <h1 id="page-title" class="text-3xl font-bold text-gray-800 tracking-tight">ภาพรวม</h1>
                <p id="page-subtitle" class="text-gray-500 mt-1">กรุณารอสักครู่...</p>
            </header>
            <div id="content-container" class="space-y-6"></div>
        </main>
    </div>

    <!-- ==================== MODALS ==================== -->
    <!-- Add Board Task Modal -->
    <div id="add-board-task-modal" class="hide fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden transform transition-all my-8">
            <div class="bg-gradient-to-r from-brand-blue to-brand-blue_light p-5 flex justify-between text-white">
                <h3 class="font-bold"><i class="fas fa-plus-circle mr-2"></i>สร้างโจทย์การบ้านลงกระดาน</h3>
                <button onclick="closeModal('add-board-task-modal')" class="text-white hover:text-gray-200"><i class="fas fa-times text-xl"></i></button>
            </div>
            <form id="board-task-form" onsubmit="submitBoardTask(event)" class="p-6 space-y-4">
                <div><label class="block text-sm font-medium mb-1">วิชา / หัวข้อ</label><input type="text" id="bt-subject" required class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-brand-blue outline-none"></div>
                <div><label class="block text-sm font-medium mb-1">รายละเอียด</label><textarea id="bt-desc" required rows="3" class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-brand-blue outline-none"></textarea></div>
                <div><label class="block text-sm font-medium mb-1">กำหนดส่ง</label><input type="date" id="bt-deadline" required class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-brand-blue outline-none"></div>
                <div>
                    <label class="block text-sm font-medium mb-1">แนบรูปโจทย์การบ้าน (ถ้ามี)</label>
                    <input type="file" id="bt-image" accept="image/*" class="w-full text-sm file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-50 file:text-brand-blue" onchange="previewTaskImage(event)">
                    <img id="bt-preview" src="" class="hide mt-3 max-h-32 rounded-lg object-cover shadow-sm">
                </div>
                <div class="pt-4 flex justify-end gap-3"><button type="submit" class="px-6 py-2.5 bg-brand-blue text-white rounded-xl shadow-md">ประกาศลงกระดาน</button></div>
            </form>
        </div>
    </div>

    <!-- Upload Portfolio Modal -->
    <div id="upload-port-modal" class="hide fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden transform transition-all my-8">
            <div class="bg-gradient-to-r from-brand-pink to-brand-pink_light p-5 flex justify-between text-white">
                <h3 class="font-bold"><i class="fas fa-upload mr-2"></i>อัปโหลดผลงาน</h3>
                <button onclick="closeModal('upload-port-modal')" class="text-white hover:text-gray-200"><i class="fas fa-times text-xl"></i></button>
            </div>
            <form id="upload-port-form" onsubmit="submitPortfolio(event)" class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">หมวดหมู่</label>
                    <select id="port-category" class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-brand-pink outline-none">
                        <option value="ผลงานวิชาการ">ผลงานวิชาการ</option>
                        <option value="รูปกิจกรรม">รูปกิจกรรม</option>
                        <option value="เกียรติบัตร">เกียรติบัตร</option>
                    </select>
                </div>
                <div><label class="block text-sm font-medium mb-1">ชื่อผลงาน</label><input type="text" id="port-title" required class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-brand-pink outline-none"></div>
                <div>
                    <label class="block text-sm font-medium mb-1">ไฟล์รูปภาพผลงาน</label>
                    <input type="file" id="port-files" accept="image/*" class="w-full text-sm file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-pink-50 file:text-brand-pink" required onchange="handleImagePreview(event)">
                    <img id="image-preview" src="" class="hide mt-3 max-h-32 rounded-lg mx-auto shadow-sm object-cover">
                </div>
                <div class="pt-4 flex justify-end gap-3"><button type="submit" class="px-6 py-2.5 bg-brand-pink text-white rounded-xl shadow-md">บันทึกลง Drive</button></div>
            </form>
        </div>
    </div>


    <script>
        // ==========================================
        // STATE & UTILS
        // ==========================================
        let currentUser = null;
        let DB = { users: [], boardTasks: [], myTasks: [], portfolios: [] };
        
        let tempPortImageBase64 = null;
        let tempTaskImageBase64 = null;

        function showLoader(text = 'กำลังประมวลผล...') {
            document.getElementById('loader-text').innerText = text;
            document.getElementById('loader-overlay').classList.remove('hide');
        }
        function hideLoader() { document.getElementById('loader-overlay').classList.add('hide'); }
        function showToast(msg, type='success') {
            const toast = document.createElement('div');
            toast.className = `fixed top-5 right-5 ${type==='error'?'bg-red-500':'bg-green-500'} text-white px-6 py-3 rounded-xl shadow-lg transition-all duration-300 z-[9999]`;
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // --- Image Compression (ลดขนาดก่อนส่งป้องกัน Payload limit) ---
        function compressImage(file, maxWidth, callback) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    let canvas = document.createElement('canvas');
                    let width = img.width; let height = img.height;
                    if (width > maxWidth) { height = Math.round((height * maxWidth) / width); width = maxWidth; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.8); // 80% quality jpeg
                    callback(dataUrl);
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        }

        // ==========================================
        // API COMMUNICATION (FETCH TO GAS)
        // ==========================================
        async function callAPI(action, payload = {}) {
            if(!GAS_WEBAPP_URL) { alert("กรุณาใส่ URL ของ GAS ในโค้ดก่อนครับ"); return { success: false }; }
            showLoader('กำลังซิงค์ข้อมูลกับฐานข้อมูล...');
            try {
                const response = await fetch(GAS_WEBAPP_URL, {
                    method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: action, payload: payload })
                });
                const result = await response.json();
                hideLoader();
                return result;
            } catch (error) {
                hideLoader(); showToast('เชื่อมต่อล้มเหลว', 'error'); console.error(error);
                return { success: false };
            }
        }

        window.onload = async () => {
            const savedSession = localStorage.getItem('m42_session_uid');
            if(savedSession) {
                const res = await callAPI('checkSession', { userId: savedSession });
                if(res.success) {
                    currentUser = res.user;
                    loadInitialData();
                } else document.getElementById('auth-view').classList.remove('hide');
            } else document.getElementById('auth-view').classList.remove('hide');
        };

        function toggleAuthMode() {
            document.getElementById('login-form').classList.toggle('hide');
            document.getElementById('register-form').classList.toggle('hide');
        }

        // --- AUTH ---
        async function handleLogin(e) {
            e.preventDefault();
            const u = document.getElementById('login-username').value;
            const p = document.getElementById('login-password').value;
            const res = await callAPI('login', { username: u, password: p });
            if(res.success) {
                currentUser = res.user;
                localStorage.setItem('m42_session_uid', currentUser.id);
                showToast(`ยินดีต้อนรับ ${currentUser.name}`);
                loadInitialData();
            } else showToast(res.message, 'error');
        }

        async function handleRegister(e) {
            e.preventDefault();
            const data = {
                name: document.getElementById('reg-name').value,
                no: document.getElementById('reg-no').value,
                user: document.getElementById('reg-username').value,
                pass: document.getElementById('reg-password').value
            };
            const res = await callAPI('register', data);
            if(res.success) {
                showToast('ลงทะเบียนและสร้างโฟลเดอร์สำเร็จ! กรุณาล็อกอิน');
                toggleAuthMode();
            } else showToast(res.message, 'error');
        }

        function handleLogout() { localStorage.removeItem('m42_session_uid'); location.reload(); }

        // --- DATA & UI ---
        async function loadInitialData() {
            const res = await callAPI('getDashboardData', { userId: currentUser.id, role: currentUser.role });
            if(res.success) { DB = res.data; showDashboard(); }
        }

        function updateUIUserInfo() {
            const roleText = currentUser.role === 'teacher' ? 'ครูประจำชั้น ม.4/2' : `เลขที่ ${currentUser.no}`;
            const pic = currentUser.profilePic || DEFAULT_AVATAR;
            
            document.getElementById('nav-user-name').innerText = currentUser.name;
            document.getElementById('nav-user-role').innerText = roleText;
            
            // Set profile pics across UI
            document.getElementById('nav-profile-img').src = pic;
            document.getElementById('mobile-header-img').src = pic;
            document.getElementById('mobile-menu-img').src = pic;
        }

        function showDashboard() {
            document.getElementById('auth-view').classList.add('hide');
            document.getElementById('main-view').classList.remove('hide');
            updateUIUserInfo();
            
            const navItems = currentUser.role === 'student' ? [
                { id: 'board', icon: 'fa-clipboard', text: 'โจทย์การบ้านห้อง' },
                { id: 'mytasks', icon: 'fa-tasks', text: 'งานที่ฉันต้องทำ' },
                { id: 'portfolio', icon: 'fa-images', text: 'คลังผลงาน' }
            ] : [
                { id: 'teacher-dash', icon: 'fa-users', text: 'สรุปการส่งงาน' }
            ];

            const navHTML = navItems.map(item => `
                <button onclick="loadPage('${item.id}')" class="w-full flex items-center gap-3 px-4 py-3 text-gray-600 rounded-xl hover:bg-gray-100 font-medium text-left">
                    <i class="fas ${item.icon} w-5 text-gray-400"></i> ${item.text}
                </button>
            `).join('');
            document.getElementById('nav-menu').innerHTML = navHTML;
            document.getElementById('mobile-nav-menu').innerHTML = navHTML;

            loadPage(currentUser.role === 'student' ? 'board' : 'teacher-dash');
        }

        function loadPage(pageId) {
            document.getElementById('mobile-menu').classList.add('hide');
            const container = document.getElementById('content-container');
            container.innerHTML = '<div class="text-center py-10 text-gray-400"><i class="fas fa-circle-notch fa-spin text-2xl mb-2"></i><br>กำลังโหลด...</div>';
            
            setTimeout(() => {
                if (pageId === 'board') renderBoard();
                else if (pageId === 'mytasks') renderMyTasks();
                else if (pageId === 'portfolio') renderPortfolio();
                else if (pageId === 'teacher-dash') renderTeacherDashboard();
            }, 100);
        }

        function closeModal(id) { document.getElementById(id).classList.add('hide'); }

        // --- VIEWS ---
        function renderBoard() {
            document.getElementById('page-title').innerText = "กระดานโจทย์การบ้าน";
            document.getElementById('page-subtitle').innerText = "เลือกรับงานที่ตรงกับคุณ เพื่อเก็บไว้ในรายการของฉัน";

            let html = `
                <div class="mb-6"><button onclick="document.getElementById('add-board-task-modal').classList.remove('hide')" class="px-5 py-2.5 bg-brand-blue text-white rounded-xl shadow hover:bg-blue-600"><i class="fas fa-plus"></i> เพิ่มโจทย์การบ้านใหม่</button></div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    ${DB.boardTasks.slice().reverse().map(t => {
                        const alreadyTaken = DB.myTasks.find(myT => myT.boardTaskId === t.id);
                        const imgHTML = t.thumbnailUrl ? `<div class="mb-3 rounded-lg overflow-hidden border border-gray-100 bg-gray-50 h-32"><img src="${t.thumbnailUrl}" class="w-full h-full object-cover cursor-pointer hover:scale-105 transition-transform" onclick="window.open('${t.imageUrl}', '_blank')"></div>` : '';
                        
                        return `
                        <div class="bg-white p-5 rounded-2xl border ${alreadyTaken ? 'border-gray-200 opacity-70' : 'border-blue-100 shadow-sm'} flex flex-col">
                            <div class="text-[10px] text-gray-400 mb-2">เพิ่มโดย: ${t.addedByName}</div>
                            <h4 class="font-bold text-lg mb-1">${t.subject}</h4>
                            ${imgHTML}
                            <p class="text-sm text-gray-600 mb-3 flex-1 bg-gray-50 p-2 rounded border border-gray-100">${t.desc}</p>
                            <div class="text-xs text-orange-500 mb-4 font-medium"><i class="far fa-calendar"></i> กำหนดส่ง: ${t.deadline}</div>
                            ${alreadyTaken ? 
                                `<button disabled class="w-full py-2 bg-gray-100 text-gray-400 rounded-xl font-medium text-sm"><i class="fas fa-check text-green-500"></i> รับงานไปแล้ว</button>` : 
                                `<button onclick="takeTask('${t.id}')" class="w-full py-2 bg-brand-pink text-white rounded-xl font-medium shadow text-sm"><i class="fas fa-hand-paper"></i> หยิบงานเข้าตัว</button>`}
                        </div>`;
                    }).join('')}
                    ${DB.boardTasks.length===0 ? '<div class="col-span-full text-center text-gray-400 py-10 bg-white rounded-xl border border-dashed">ไม่มีโจทย์การบ้าน</div>':''}
                </div>
            `;
            document.getElementById('content-container').innerHTML = html;
        }

        function renderMyTasks() {
            document.getElementById('page-title').innerText = "งานที่ฉันต้องส่ง";
            document.getElementById('page-subtitle').innerText = "จัดการสถานะการบ้านของคุณ";
            const pending = DB.myTasks.filter(t => t.status === 'pending');
            const completed = DB.myTasks.filter(t => t.status === 'completed');

            let html = `
                <div class="flex gap-4 mb-6">
                    <div class="flex-1 bg-orange-50 border border-orange-100 rounded-2xl p-4"><div class="text-orange-800 font-bold text-sm">ค้างส่ง</div><div class="text-3xl text-orange-500 font-bold">${pending.length}</div></div>
                    <div class="flex-1 bg-green-50 border border-green-100 rounded-2xl p-4"><div class="text-green-800 font-bold text-sm">ส่งแล้ว</div><div class="text-3xl text-green-500 font-bold">${completed.length}</div></div>
                </div>

                <h3 class="font-bold text-lg mb-3 border-l-4 border-orange-500 pl-2">รอทำ (${pending.length})</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
                    ${pending.map(t => {
                        const imgHTML = t.thumbnailUrl ? `<img src="${t.thumbnailUrl}" class="w-full h-24 object-cover rounded-lg mb-2" onclick="window.open('${t.imageUrl}')">` : '';
                        return `
                        <div class="bg-white p-5 rounded-2xl border border-orange-200 shadow-sm relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-1 h-full bg-orange-400"></div>
                            <h4 class="font-bold">${t.subject}</h4>
                            ${imgHTML}
                            <p class="text-sm text-gray-500 mt-1 mb-4 line-clamp-2">${t.desc}</p>
                            <button onclick="updateTaskStatus('${t.myTaskId}', 'completed')" class="w-full py-2 bg-green-50 text-green-600 font-bold rounded-xl text-sm border border-green-200"><i class="fas fa-check-circle"></i> กดเมื่อทำเสร็จ</button>
                        </div>`
                    }).join('')}
                    ${pending.length===0?'<div class="col-span-full text-gray-400 text-sm">ไม่มีงานค้าง</div>':''}
                </div>

                <h3 class="font-bold text-lg mb-3 border-l-4 border-green-500 pl-2">เสร็จแล้ว (${completed.length})</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 opacity-60">
                    ${completed.map(t => `
                        <div class="bg-gray-50 p-4 rounded-2xl border border-gray-200">
                            <h4 class="font-bold text-gray-600 line-through">${t.subject}</h4>
                            <button onclick="updateTaskStatus('${t.myTaskId}', 'pending')" class="text-xs text-orange-500 mt-2 hover:underline">เปลี่ยนเป็นยังไม่เสร็จ</button>
                        </div>
                    `).join('')}
                </div>
            `;
            document.getElementById('content-container').innerHTML = html;
        }

        function renderPortfolio() {
            document.getElementById('page-title').innerText = "คลังผลงานส่วนตัว";
            document.getElementById('page-subtitle').innerText = "อัปโหลดและเก็บในโฟลเดอร์ Drive ของคุณอัตโนมัติ";
            let html = `
                <div class="mb-6"><button onclick="document.getElementById('upload-port-modal').classList.remove('hide')" class="px-5 py-2.5 bg-brand-pink text-white rounded-xl shadow"><i class="fas fa-upload"></i> อัปโหลดผลงานใหม่</button></div>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                    ${DB.portfolios.length===0 ? '<div class="col-span-full text-center text-gray-400 py-10 bg-white rounded-xl border border-dashed">ยังไม่มีผลงาน</div>':''}
                    ${DB.portfolios.slice().reverse().map(p => `
                        <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm relative group">
                            <div class="h-48 bg-gray-100 overflow-hidden">
                                <img src="${p.thumbnailUrl}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" onerror="this.src='https://via.placeholder.com/400?text=Image'">
                            </div>
                            <div class="p-4">
                                <h4 class="font-bold text-gray-800 line-clamp-1">${p.title}</h4>
                                <div class="flex justify-between items-center mt-2">
                                    <span class="text-[10px] bg-pink-50 text-brand-pink px-2 py-1 rounded">${p.category}</span>
                                    <a href="${p.fileUrl}" target="_blank" class="text-xs text-brand-blue hover:underline">ดูรูปเต็ม <i class="fas fa-external-link-alt"></i></a>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            document.getElementById('content-container').innerHTML = html;
        }

        function renderTeacherDashboard() {
            document.getElementById('page-title').innerText = "สรุปการส่งงาน ม.4/2";
            document.getElementById('page-subtitle').innerText = "รายชื่อนักเรียนและสถานะ";
            const students = DB.users.filter(u => u.role === 'student').sort((a,b)=>a.no - b.no);
            let html = `
                <div class="bg-white rounded-3xl border border-gray-100 overflow-hidden shadow-sm">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse whitespace-nowrap">
                            <thead>
                                <tr class="bg-gray-50 text-gray-500 text-sm border-b">
                                    <th class="p-4 text-center w-16">เลขที่</th>
                                    <th class="p-4">นักเรียน</th>
                                    <th class="p-4 text-center">เสร็จแล้ว</th>
                                    <th class="p-4 text-center">ค้างส่ง</th>
                                    <th class="p-4 text-center">ผลงาน (ชิ้น)</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${students.map(s => {
                                    const stdTasks = DB.allStudentTasks.filter(t => t.studentId === s.id);
                                    const completed = stdTasks.filter(t => t.status === 'completed').length;
                                    const pending = stdTasks.filter(t => t.status === 'pending').length;
                                    const ports = DB.allPortfolios.filter(p => p.studentId === s.id).length;
                                    const avatar = s.profilePic || DEFAULT_AVATAR;
                                    
                                    return `
                                    <tr class="border-b border-gray-50 hover:bg-blue-50/30">
                                        <td class="p-4 text-center font-bold text-gray-500">${s.no}</td>
                                        <td class="p-4 font-medium flex items-center gap-3">
                                            <img src="${avatar}" class="w-8 h-8 rounded-full object-cover border border-gray-200"> ${s.name}
                                        </td>
                                        <td class="p-4 text-center"><span class="bg-green-100 text-green-700 px-2 py-1 rounded text-sm font-bold">${completed}</span></td>
                                        <td class="p-4 text-center"><span class="bg-orange-100 text-orange-700 px-2 py-1 rounded text-sm font-bold">${pending}</span></td>
                                        <td class="p-4 text-center text-pink-500 font-bold"><i class="fas fa-folder"></i> ${ports}</td>
                                    </tr>`
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            document.getElementById('content-container').innerHTML = html;
        }

        // --- UPLOADS & ACTIONS ---
        function handleProfileUpload(e) {
            const file = e.target.files[0];
            if(!file) return;
            compressImage(file, 400, async (base64Str) => {
                const payload = { userId: currentUser.id, fileData: base64Str.split(',')[1], mimeType: 'image/jpeg', fileName: 'profile_' + currentUser.id };
                const res = await callAPI('updateProfilePic', payload);
                if(res.success) {
                    currentUser.profilePic = res.thumbnailUrl;
                    updateUIUserInfo();
                    showToast('อัปเดตโปรไฟล์สำเร็จ');
                }
            });
        }

        function previewTaskImage(e) {
            const file = e.target.files[0];
            if(file) {
                compressImage(file, 800, (base64Str) => {
                    tempTaskImageBase64 = base64Str;
                    const img = document.getElementById('bt-preview');
                    img.src = base64Str; img.classList.remove('hide');
                });
            }
        }

        async function submitBoardTask(e) {
            e.preventDefault();
            const payload = {
                subject: document.getElementById('bt-subject').value,
                desc: document.getElementById('bt-desc').value,
                deadline: document.getElementById('bt-deadline').value,
                addedBy: currentUser.id, addedByName: currentUser.name,
                hasImage: tempTaskImageBase64 ? true : false
            };
            if(tempTaskImageBase64) {
                payload.fileData = tempTaskImageBase64.split(',')[1];
                payload.mimeType = 'image/jpeg'; payload.fileName = 'task_' + Date.now();
            }

            const res = await callAPI('addBoardTask', payload);
            if(res.success) {
                closeModal('add-board-task-modal'); e.target.reset();
                document.getElementById('bt-preview').classList.add('hide'); tempTaskImageBase64 = null;
                showToast('ประกาศการบ้านลงกระดานสำเร็จ'); loadInitialData(); 
            }
        }

        function handleImagePreview(e) {
            const file = e.target.files[0];
            if(file) {
                compressImage(file, 1024, (base64Str) => {
                    tempPortImageBase64 = base64Str;
                    const img = document.getElementById('image-preview');
                    img.src = base64Str; img.classList.remove('hide');
                });
            }
        }

        async function submitPortfolio(e) {
            e.preventDefault();
            if(!tempPortImageBase64) { alert("กรุณาเลือกไฟล์ภาพ"); return; }
            const payload = {
                studentId: currentUser.id,
                category: document.getElementById('port-category').value,
                title: document.getElementById('port-title').value,
                fileData: tempPortImageBase64.split(',')[1],
                mimeType: 'image/jpeg', fileName: "portfolio_" + Date.now()
            };
            const res = await callAPI('uploadPortfolio', payload);
            if(res.success) {
                closeModal('upload-port-modal'); e.target.reset();
                document.getElementById('image-preview').classList.add('hide'); tempPortImageBase64 = null;
                showToast('อัปโหลดผลงานสำเร็จ!'); loadInitialData();
            }
        }

        async function takeTask(boardTaskId) {
            const res = await callAPI('takeTask', { studentId: currentUser.id, boardTaskId: boardTaskId });
            if(res.success) { showToast('รับงานสำเร็จ ดูที่แท็บ งานที่ฉันต้องทำ'); loadInitialData(); }
        }

        async function updateTaskStatus(myTaskId, newStatus) {
            const res = await callAPI('updateTaskStatus', { myTaskId: myTaskId, newStatus: newStatus });
            if(res.success) loadInitialData();
        }
    </script>
</body>
</html>
